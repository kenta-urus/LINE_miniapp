<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>診察券</title>

		<!-- LIFF SDK -->
		<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

		<!-- QRコード -->
		<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

		<style>
			body {
				  font-family: sans-serif;
				  display: flex;
				  justify-content: center;
				  padding: 20px;
				  background: #f0f2f5;
			}

			/* カード */
			.card {
				  width: 90vw;
				  max-width: 400px;
				  aspect-ratio: 1.586;
				  background-image: url("診察券.jpg");
				  background-size: cover;
				  background-position: center;
				  border-radius: 15px;
				  overflow: hidden;
				  position: relative;
				  margin-top: 20px;
				  color: black;
			}

			/* 位置だけ固定（サイズはJSで） */
			.userid {
				  position: absolute;
				  top: 54%;
				  left: 20%;
				  font-weight: bold;
			}
			.name {
				  position: absolute;
				  top: 71%;
				  left: 25%;
			}
			.dob {
				  position: absolute;
				  top: 84%;
				  left: 25%;
			}
			.sex {
				  position: absolute;
				  top: 84%;
				  left: 72%;
			}
			.qr {
				  position: absolute;
				  bottom: 3%;
				  right: 3%;
			}
			.qr canvas {
				  display: block;
				  background: white;
				  padding: 4px;
				  border-radius: 8px;
			}
		</style>
	</head>

	<body>

		<div class="card">
			  <div class="hospital">
			    医療法人社団 LINE Business会<br>
			    ＬＩＮＥ総合病院
			  </div>

			  <div id="name" class="name">読み込み中...</div>

			  <div id="info" class="info"></div>

			  <div class="qr">
			    <canvas id="qrcode"></canvas>
			  </div>
		</div>

		<script>
		const LIFF_ID = "2009685891-3LT8yZiY";

		let patient = {
			  id: "12345",
			  name: "",
			  dob: "2012年01月20日",
			  sex: "男"
		};

		// ★ カードサイズに応じて全て調整
		function adjustLayout() {
			const card = document.querySelector('.card');
		  	if (!card) return;

		  	const width = card.offsetWidth;

			  // フォントサイズ（カード基準）
			  document.querySelector('.name').style.fontSize = (width * 0.045) + "px";
			  document.querySelector('.userid').style.fontSize = (width * 0.035) + "px";
			  document.querySelector('.dob').style.fontSize = (width * 0.035) + "px";
			  document.querySelector('.sex').style.fontSize = (width * 0.035) + "px";

		  	// QRサイズ
		  	const qrSize = width * 0.27;
			QRCode.toCanvas(document.getElementById('qrcode'), patient.id, {
				width: qrSize
			 });
		}

		async function main() {
			try {
			    await liff.init({ liffId: LIFF_ID });

			    if (!liff.isLoggedIn()) {
			      liff.login();
			      return;
			    }

			    const profile = await liff.getProfile();

			    patient.name = profile.displayName;

			    document.getElementById("name").innerText = patient.name;
			    document.getElementById("userId").innerText = patient.id;
			    document.getElementById("dob").innerText = patient.dob;
			    document.getElementById("sex").innerText = patient.sex;

			    // 初回描画
			    adjustLayout();

		    } catch (error) {
		    	console.error(error);
		    }
		}

		// リサイズ対応（超重要）
		window.addEventListener('resize', adjustLayout);

		// 初期起動
		window.onload = main;
		</script>

	</body>
</html>
