<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>診察券</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- QRコード -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
  body {
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
    background: #f0f2f5;
  }
  
  /* カード */
  .card {
    width: 100%;
    max-width: 350px;
    aspect-ratio: 1.586;
    background-image: url("診察券.jpg");
    background-size: cover;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    color: black;
  }
  
  /* 病院名 */
  .hospital {
    position: absolute;
    top: 10px;
    left: 15px;
    font-size: 14px;
  }
  
  /* ID */
  .userid {
    position: absolute;
    top: 112px;
    left: 60px;
    font-size: 18px;
  }
  /* 名前 */
  .name {
    position: absolute;
    top: 150px;
    left: 60px;
    font-size: 18px;
    font-weight: bold;
  }  
  /* 生年月日 */
  .dob {
    position: absolute;
    top: 182px;
    left: 70px;
    font-size: 18px;
  }  
  /* 性別 */
  .sex {
    position: absolute;
    top: 180px;
    left: 200px;
    font-size: 18px;
    font-weight: bold;
  }  
  
  /* QR */
  .qr {
    position: absolute;
    bottom: 5px;
    right: 2px;
  }
  </style>
</head>

<body>
  
  <div class="card">
    <!--
    <div class="hospital">
      医療法人社団 LINE Business会<br>
      ＬＩＮＥ総合病院
    </div>
    -->
    <div id="name" class="name">読み込み中...</div>
    <div id="userId" class="userid"></div>
    <div id="dob" class="dob"></div>
    <div id="sex" class="sex"></div>
    <canvas id="qrcode" class="qr"></canvas>
  </div>

  <script>
  // 今日の日付情報を取得し変数dTodayに格納する
  var dToday = new Date();
  // 取得した日付情報から年・月・日・曜日を取得する
  var year = dToday.getFullYear();
  var month = dToday.getMonth()+1;
  var day = dToday.getDate();
  var week = dToday.getDay();
  // 曜日データを配列に格納する
  var yobi= new Array("日","月","火","水","木","金","土");
    
  const LIFF_ID = "2009685891-3LT8yZiY";
  
  async function main() {
    try {
      // 初期化
      await liff.init({ liffId: LIFF_ID });
  
      console.log("LIFF init OK");
  
      // LINEログイン確認
      if (!liff.isLoggedIn()) {
        console.log("未ログイン → ログインへ");
        liff.login();
        return;
      }
  
      console.log("ログイン済み");
  
      // プロフィール取得
      const profile = await liff.getProfile();
  
      console.log("プロフィール取得OK", profile);

      const patient = {
        id: "12345",
        name: profile.displayName,
        dob: "1964/03/10",
        sex: "男"
      };
      
      //const patientId = profile.userId;
  
      document.getElementById("name").innerText = patient.name;
      document.getElementById("userId").innerText = patient.id;
      document.getElementById("dob").innerText = patient.dob;
      document.getElementById("sex").innerText = patient.sex;
  
      // QRコード生成
      // QRCode.toCanvas(document.getElementById('qrcode'), patientId);
      QRCode.toCanvas(document.getElementById('qrcode'), patient.id, {width: 80});
  
    } catch (error) {
      console.error("エラー発生:", error);
      document.getElementById("name").innerText = "エラーが発生しました！　今日の日付は" + year + "年" + month + "月" + day + "日 " + yobi[week] + "曜日";
    }
  }
  
  main();
  </script>

</body>
</html>
