<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>診察券</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <!-- QRコード -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      aspect-ratio: 1.586; /* カード比率 */
      background-image: url("card.png");
      background-size: cover;
      position: relative;
    }
    .qr {
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>

<body>

<div class="card">
  <h3>医療法人社団 LINE Business会</h3>
  <h3>ＬＩＮＥ総合病院</h3>
  <p id="name">読み込み中...</p>
  <p id="userId"></p>
  <div class="qr">
    <canvas id="qrcode"></canvas>
  </div>
</div>

<script>
// 今日の日付情報を取得し変数dTodayに格納する
var dToday = new Date();
// 取得した日付情報から年・月・日・曜日を取得する
var year = dToday.getFullYear();
var month = dToday.getMonth()+1;
var day = dToday.getDate();
var week = dToday.getDay();
// 曜日データを配列に格納する
var yobi= new Array("日","月","火","水","木","金","土");
  
const LIFF_ID = "2009685891-3LT8yZiY";

async function main() {
  try {
    // 初期化
    await liff.init({ liffId: LIFF_ID });

    console.log("LIFF init OK");

    // LINEログイン確認
    if (!liff.isLoggedIn()) {
      console.log("未ログイン → ログインへ");
      liff.login();
      return;
    }

    console.log("ログイン済み");

    // プロフィール取得
    const profile = await liff.getProfile();

    console.log("プロフィール取得OK", profile);

    const patientId = profile.userId;

    document.getElementById("name").innerText = profile.displayName;
    document.getElementById("userId").innerText = "ID: " + patientId;

    // QRコード生成
    QRCode.toCanvas(document.getElementById('qrcode'), patientId);

  } catch (error) {
    console.error("エラー発生:", error);
    document.getElementById("name").innerText = "エラーが発生しました！　今日の日付は" + year + "年" + month + "月" + day + "日 " + yobi[week] + "曜日";
  }
}

main();
</script>
  
</body>
</html>
