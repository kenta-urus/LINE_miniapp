<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>診察券</title>

		<!-- LIFF SDK -->
		<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

		<!-- QRコード -->
		<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

		<style>
			body {
				  font-family: sans-serif;
				  display: flex;
				  justify-content: center;
				  padding: 20px;
				  background: #f0f2f5;
			}

			/* カード */
			.card {
				  width: 90vw;
				  max-width: 400px;
				  aspect-ratio: 1.586;
				  background-image: url("診察券.jpg");
				  background-size: cover;
				  background-position: center;
				  border-radius: 15px;
				  overflow: hidden;
				  position: relative;
				  margin-top: 20px;
				  color: black;
			}

			/* 位置だけ固定（サイズはJSで） */
			.patientid {
			  position: absolute;
			  top: 55%;
			  left: 20%;
			  font-weight: bold;
			}
			
			.name {
			  position: absolute;
			  top: 70%;
			  left: 20%;
			}
			
			.dob {
			  position: absolute;
			  top: 82%;
			  left: 10%;
			}
			
			.sex {
			  position: absolute;
			  top: 82%;
			  left: 60%;
			}
			
			.qr {
			  position: absolute;
			  bottom: 5%;
			  right: 5%;
			}
		</style>
	</head>

	<body>

		<div class="card">
		<!--	  <div class="hospital">
			    医療法人社団 LINE Business会<br>
			    ＬＩＮＥ総合病院
			  </div>
		-->
			  <div id="patientId" class="patientid"></div>
			  <div id="name" class="name">読み込み中...</div>
			  <div id="dob" class="dob"></div>
			  <div id="sex" class="sex"></div>
			  <div class="qr">
			    <canvas id="qrcode"></canvas>
			  </div>
		</div>

		<script>
		// 今日の日付情報を取得し変数dTodayに格納する
		var dToday = new Date();
		// 取得した日付情報から年・月・日・曜日を取得する
		var year = dToday.getFullYear();
		var month = dToday.getMonth()+1;
		var day = dToday.getDate();
		var week = dToday.getDay();
		// 曜日データを配列に格納する
		var yobi= new Array("日","月","火","水","木","金","土");
			
		const LIFF_ID = "2009685891-3LT8yZiY";
			
		let patient = {
			  id: "12345",
			  name: "",
			  dob: "2012年01月20日",
			  sex: "男"
		};

		// ★ カードサイズに応じて全て調整
		function adjustLayout() {
		  const card = document.querySelector('.card');
		  const width = card.offsetWidth;
		
		  // フォントサイズ（微調整済）
		  document.querySelector('.patientid').style.fontSize = (width * 0.045) + "px";
		  document.querySelector('.name').style.fontSize = (width * 0.05) + "px";
		  document.querySelector('.dob').style.fontSize = (width * 0.04) + "px";
		  document.querySelector('.sex').style.fontSize = (width * 0.04) + "px";
		  // QRサイズ（少し小さめがバランス良い）
		  const qrSize = width * 0.22;
		  QRCode.toCanvas(document.getElementById('qrcode'), patient.id, { width: qrSize });
		}

		async function main() {
			try {
				// 初期化
			    await liff.init({ liffId: LIFF_ID });
				console.log("LIFF init OK");
				// LINEログイン確認
			    if (!liff.isLoggedIn()) {
					console.log("未ログイン → ログインへ");
			      	liff.login();
			      	return;
			    }
				console.log("ログイン済み");
				// プロフィール取得
			    const profile = await liff.getProfile();
			    patient.name = profile.displayName;
				console.log(profile.displayName);
			    document.getElementById("patientid").innerText = patient.id;
				console.log(patient.id);
			    document.getElementById("name").innerText = patient.name;
				console.log(patient.name);
			    document.getElementById("dob").innerText = patient.dob;
				console.log(patient.dob);
			    document.getElementById("sex").innerText = patient.sex;
				console.log(patient.sex);
			    // 初回描画
			    adjustLayout();

		    } catch (error) {
				console.error("エラー発生:", error);
      			document.getElementById("name").innerText = "エラーが発生しました！　今日の日付は" + year + "年" + month + "月" + day 
		    }
		}

		// リサイズ対応（超重要）
		window.addEventListener('resize', adjustLayout);

		// 初期起動
		window.onload = main;
		</script>

	</body>
</html>
