<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>診察券</title>

		<!-- LIFF SDK -->
		<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

		<!-- QRコード -->
		<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

		<style>
			body {
				    font-family: sans-serif;
				    display: flex;
				    flex-direction: column;
				    align-items: center;
				    padding: 20px;
				    background: #f0f2f5;
			}

			/* カード */
			.card {
				  width: 90vw;
				  max-width: 400px;
				  aspect-ratio: 1.586;
				  background-image: url("診察券.jpg");
				  background-size: cover;
				  background-position: center;
				  border-radius: 15px;
				  overflow: hidden;
				  position: relative;
				  margin-top: 20px;
				  color: black;
			}

			/* 位置だけ固定（サイズはJSで） */
			/* 患者ID */
			.patientid {
			  position: absolute;
			  top: 53%;
			  left: 18%;
			  font-weight: bold;
			}
			/* 患者氏名 */
			.name {
			  position: absolute;
			  top: 70%;
			  left: 22%;
			}
			/* 生年月日 */
			.dob {
			  position: absolute;
			  top: 84%;
			  left: 24%;
			}
			/* 性別 */
			.sex {
			  position: absolute;
			  top: 83%;
			  left: 71%;
			}
			/* QR */
			.qr {
			  position: absolute;
			  bottom: 2%;
			  right: 1%;
			}

			/* 登録ボタン用CSS */
			/* ボタンエリア */
			.register-area {
			    margin-top: 20px;
			    text-align: center;
			}
			/* ボタン */ 
			.register-btn {
			    background: #06c755;
			    color: white;
			    border: none;
			    border-radius: 8px;
			    padding: 12px 24px;
			    font-size: 16px;
			    cursor: pointer;
			}

			/* 登録フォーム用css */
			.register-form {
			    display: none;
			    margin-top: 15px;
			    width: 90vw;
			    max-width: 400px;
			    background: white;
			    border-radius: 10px;
			    padding: 15px;
			    box-sizing: border-box;
			}			
			.register-form input {
			    width: 100%;
			    margin-bottom: 10px;
			    padding: 10px;
			    box-sizing: border-box;
			    font-size: 16px;
			}
			.save-btn {
			    width: 100%;
			    background: #0078ff;
			    color: white;
			    border: none;
			    border-radius: 8px;
			    padding: 12px;
			    font-size: 16px;
			}
			
		</style>
	</head>

	<body>

		<!-- 診察券 -->
		<div class="card">
		  <div id="patientid" class="patientid"></div>
		  <div id="name" class="name">読み込み中...</div>
		  <div id="dob" class="dob"></div>
		  <div id="sex" class="sex"></div>
		  <div class="qr">
			<canvas id="qrcode"></canvas>
		  </div>
		</div>

		<!-- 新規登録ボタン -->
		<div id="registerArea" class="register-area" style="display:none;">
		    <button class="register-btn" onclick="showRegisterForm()">
		        新規登録
		    </button>
		</div>

		<!-- 新規登録フォーム -->
		<div id="registerForm" class="register-form">
			<input id="patientNo" type="text" placeholder="診察券番号">
		    <input id="patientName" type="text" placeholder="氏名">
			<input id="patientKana" type="text" placeholder="かな">
			<input id="patientsex" type="text" placeholder="生物学的性別">
			<input id="birthDate" type="date">
		    <button class="save-btn" onclick="registerPatient()">
		        登録
			</button >
		</div>
		
		<script>

		//----------------------------------------//
		// ページ内の全リソース読み込み完了時のログ
		//----------------------------------------//
		window.onload = function() {
    		console.log("Version 2026-06-24 01:00");
		}

		//========================================//
		// グローバル定義
		//========================================//	
		// 今日の日付情報を取得し変数dTodayに格納する
		var dToday = new Date();
		// 取得した日付情報から年・月・日・曜日を取得する
		var year = dToday.getFullYear();
		var month = dToday.getMonth()+1;
		var day = dToday.getDate();
		var week = dToday.getDay();
		// 曜日データを配列に格納する
		var yobi= new Array("日","月","火","水","木","金","土");
			
		const LIFF_ID = "2009685891-3LT8yZiY";
		//const LIFF_ID = "2010080873-1rSYl0PJ";
			
		let patient = {
			  id: "",
			  name: "",
			  dob: "",
			  sex: ""
		};

		//----------------------------------------//
		// 患者登録用フォーム表示（function）
		//----------------------------------------//
		function showRegisterForm(){
			document.getElementById(
        	"registerForm"
    		).style.display = "block";
		}

		//----------------------------------------//
		// 患者情報 登録処理（function）
		//----------------------------------------//
		async function registerPatient(){

			console.log("登録開始");

			await liff.init({ liffId: LIFF_ID });
			await liff.ready;
			const profile = await liff.getProfile();
			
			const body = {
					line_user_id: profile.userId,
					patient_id: document.getElementById("patientNo").value,
					name:       document.getElementById("patientName").value,
					name_kana:  document.getElementById("patientKana").value,
					gender:     document.getElementById("patientsex").value,
					birth_date: document.getElementById("birthDate").value
    		};

			console.log(body);
			
			console.log("fetch開始");
			const res = await fetch(
				"https://default-armoire-unplanned.ngrok-free.dev/register",
        		{method:"POST",
            	headers:{
                	"Content-Type":"application/json",
                	"ngrok-skip-browser-warning":"true"
            	},
            	body:JSON.stringify(body)
        		}
    		);
			console.log("fetch完了");
			
			console.log("HTTP Status =", res.status);
			
    		const data = await res.json();

			console.log(data);
			
			alert("登録完了");
			location.reload();
		}

		//----------------------------------------//
		// ★ カードサイズに応じて全て調整（function）
		//----------------------------------------//
		function adjustLayout() {
		  const card = document.querySelector('.card');
		  const width = card.offsetWidth;
		
		  // フォントサイズ（微調整済）
		  document.querySelector('.patientid').style.fontSize = (width * 0.045) + "px";
		  document.querySelector('.name').style.fontSize = (width * 0.05) + "px";
		  document.querySelector('.dob').style.fontSize = (width * 0.04) + "px";
		  document.querySelector('.sex').style.fontSize = (width * 0.04) + "px";
		  // QRサイズ（少し小さめがバランス良い）
		  const qrSize = width * 0.22;

		  // 患者IDをQRコードに変換
		  console.log("patient : ",patient);
	      const canvas = document.getElementById('qrcode');
          QRCode.toCanvas(canvas, String(patient.id), { width: qrSize });
		  // QRCode.toCanvas(document.getElementById('.qrcode'), patient.id, { width: qrSize });
		}

		//============================================//
		// スクリプトメイン処理
		//============================================//
		async function main() {
			try 
			{

				console.log("main開始");
				// 初期化
			    await liff.init({ liffId: LIFF_ID });
				console.log("LIFF init OK");
				console.log("isLoggedIn=", liff.isLoggedIn());
				
				// LINEログイン確認
			    if (!liff.isLoggedIn()) {
					console.log("未ログイン → ログインへ");
			      	liff.login();
			      	return;
			    }
				console.log("ログイン済み");

				// Google Sheetから取得
				const profile = await liff.getProfile();
				// API呼び出し
				console.log("LINEのユーザーIDは" + profile.userId);

				//********** デバッグロジック START **********//
				try
				{

				    console.log("fetch開始");
				
				    const url = `https://default-armoire-unplanned.ngrok-free.dev/patient?line_user_id=${profile.userId}`;
				    const res = await fetch(url);
				
				    console.log("fetch成功");
				    console.log("status=", res.status);
				
				    const text = await res.text();
				    console.log("body=", text);
			
				} 
				catch(err)
				{
				    console.error("fetch失敗");
				    console.error(err);
				}
			//********** デバッグロジック END **********//
			}

			// リサイズ対応（超重要）
			window.addEventListener('resize', adjustLayout);
	
			// 初期起動
			// window.onload = main;
			window.addEventListener("load", () => { main(); });
		}
		</script>

	</body>
</html>
