<!DOCTYPE html>
<html lang="ja">
	<head>
	    <meta charset="UTF-8">
	    <title>診察券ミニアプリ</title>
	
	    <link rel="stylesheet" href="css/style.css">
	    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
	</head>
	
	<body>

		<!--**************************************** 
		    診察券表示画面
		******************************************-->
		<div id="screen-card" class="screen">
		    <!-- 診察券画像 -->
		    <div class="card-container">
		        <img id="card" src="" alt="診察券">
		    </div>
		    <!-- 下部固定メニュー -->
		    <div class="bottom-menu">
		        <div id="updateButton" class="menu-item">更新</div>
				<div id="deleteButton" class="menu-item">削除</div>
		        <div id="changeButton" class="menu-item">画像を変更</div>
				<div id="delimgButton" class="menu-item">画像削除</div>
		    </div>		
		</div>

		<!--**************************************** 
		    [更新]ボタンタップ後の待機画面
		******************************************-->
		<div id="screen-loading" class="screen" style="display:none;">
    		<div class="loading">更新中...</div>
		</div>

		<!--**************************************** 
		    [画像削除]ボタンタップ後の待機画面
		******************************************-->
		<div id="screen-delloading" class="screen" style="display:none;">
    		<div class="delloading">画像削除中...</div>
		</div>

		<!--**************************************** 
		    [診察券画像を変更]ボタンタップ後の画面
		******************************************-->
		<div id="screen-upload" class="screen" style="display:none;">
		    <h2 class="upload-title">診察券画像の変更</h2>
			<div class="upload-area">
		        <input type="file" id="uploadImage" accept="image/*">
		        <img id="uploadPreview" class="preview-image" />
	    	</div>
		    <div class="upload-buttons">
	    	    <div id="uploadSaveButton" class="upload-btn">保存</div>
	        	<div id="uploadCancelButton" class="upload-btn cancel">キャンセル</div>
	    	</div>
		</div>
	
		<!--**************************************** 
		    患者情報の登録
		******************************************-->
		<div id="screen-register" class="screen" style="display:none;">
		    <h2>患者情報の登録</h2>
		    <div class="form-group">
		        <label for="patientIdInput">患者ID</label>
		        <input id="patientIdInput" type="text" placeholder="例：123456">
		    </div>
		    <div class="form-group">
		        <label for="nameInput">名前</label>
		        <input id="nameInput" type="text" placeholder="例：山田太郎">
		    </div>
		    <div class="form-group">
		        <label for="birthInput">生年月日</label>
		        <input id="birthInput" type="date">
		    </div>
		    <button id="registerButton" class="primary-btn">登録する</button>
		</div>

		
		<!--**************************************** 
		    JavaScript 
		******************************************-->
		<script type="module" src="./js/main.js"></script>
		<script type="module" src="./js/api.js"></script>
		<script type="module" src="./js/card.js"></script>
		<script type="module" src="./js/upload.js"></script>
		
	</body>
</html>
