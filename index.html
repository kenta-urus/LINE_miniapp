<!DOCTYPE html>
<html lang="ja">
	<head>
	    <meta charset="UTF-8">
	    <title>診察券ミニアプリ</title>
	
	    <link rel="stylesheet" href="css/style.css">
	    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
	</head>
	
	<body>
	
		<div id="screen-card" class="screen">
		    <img id="card" src="" alt="診察券">
		    
		    <button id="updateButton">更新</button>
		    <button id="changeButton">診察券を変更する</button>
		</div>

		<div id="screen-upload" class="screen" style="display:none;">
		    <input type="file" id="uploadImage" accept="image/*">
		    <img id="uploadPreview" />
		    <button id="uploadSaveButton">保存</button>
		</div>
	
		<div id="screen-register" class="screen" style="display:none;">
		    <h2>患者情報の登録</h2>
		    <div class="form-group">
		        <label for="patientIdInput">患者ID</label>
		        <input id="patientIdInput" type="text" placeholder="例：123456">
		    </div>
		    <div class="form-group">
		        <label for="nameInput">名前</label>
		        <input id="nameInput" type="text" placeholder="例：山田太郎">
		    </div>
		    <div class="form-group">
		        <label for="birthInput">生年月日</label>
		        <input id="birthInput" type="date">
		    </div>
		    <button id="registerButton" class="primary-btn">登録する</button>
		</div>

		<script src="js/api.js"></script>
		<script src="js/card.js"></script>
		<script src="js/upload.js"></script>
		<script src="js/main.js"></script>
	
	</body>
</html>
